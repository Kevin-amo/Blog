server:
  port: 8081

spring:
  config:
    import: optional:file:./src/main/resources/application-private.yaml
  ai:
    dashscope:
      chat:
        options:
          multi-model: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      # 单个文件最大5mb
      max-file-size: 5MB
      # 单次请求最大5mb
      max-request-size: 5MB

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: blog.pojo
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  expiration: 720000000  # 暂时设定200h

aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    bucket-name: lqr-blog
    domain: lqr-blog.oss-cn-hangzhou.aliyuncs.com

# knife4j
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: blog

blog:
  ai:
    summary:
      user-window: 1m
      user-window-max-requests: 3
      ip-window: 1m
      ip-window-max-requests: 10
      cache-ttl: 12h
      lock-ttl: 2m
      wait-timeout: 75s
      wait-poll-interval: 300ms
